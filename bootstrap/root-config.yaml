apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nekazari-config-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nkz-os/gitops-config
    targetRevision: HEAD
    path: gitops/config
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: nekazari
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
