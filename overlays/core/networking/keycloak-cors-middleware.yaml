apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: keycloak-cors
  namespace: nekazari
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - Authorization
      - Content-Type
      - Accept
      - Origin
      - User-Agent
    accessControlAllowOriginList:
      - "https://{{FRONTEND_DOMAIN}}"
      - "https://{{API_DOMAIN}}"
      - "http://localhost:5173"
      - "http://localhost:3000"
    accessControlMaxAge: 100
    addVaryHeader: true
    accessControlAllowCredentials: true
