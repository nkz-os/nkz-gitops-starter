# =============================================================================
# Certificate Resource para {{KEYCLOAK_DOMAIN}}
# =============================================================================

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-tls
  namespace: nekazari
spec:
  secretName: auth-tls
  duration: 2160h # 90 días
  renewBefore: 360h # 15 días antes de expirar
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: {{KEYCLOAK_DOMAIN}}
  dnsNames:
    - {{KEYCLOAK_DOMAIN}}

