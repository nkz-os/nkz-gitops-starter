# Production Secret for BioOrchestrator — manual apply only.
# Not managed by ArgoCD (directory.exclude from public app).
# Apply: kubectl apply -f bioorchestrator-secret.yaml -n nekazari
apiVersion: v1
kind: Secret
metadata:
  name: bioorchestrator-secrets
  namespace: nekazari
  labels:
    app.kubernetes.io/name: bioorchestrator
    app.kubernetes.io/part-of: nekazari
type: Opaque
stringData:
  neo4j-auth: "neo4j/bioorchestrator"
  EPPO_API_TOKEN: ""
  bioorchestrator-dadis-token: ""
  KEYCLOAK_JWKS_URL: "https://{{KEYCLOAK_DOMAIN}}/auth/realms/nekazari/protocol/openid-connect/certs"
  KEYCLOAK_CLIENT_ID: "nekazari-frontend"
