# Production Ingress for BioOrchestrator — manual apply only.
# Not managed by ArgoCD (directory.exclude from public app).
# Apply: kubectl apply -f bioorchestrator-ingress.yaml -n nekazari
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: bioorchestrator-strip-prefix
  namespace: nekazari
spec:
  stripPrefix:
    prefixes:
      - /api/bioorchestrator
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bioorchestrator-api-service
  namespace: nekazari
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: nekazari-bioorchestrator-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: {{API_DOMAIN}}
      http:
        paths:
          - path: /api/bioorchestrator
            pathType: Prefix
            backend:
              service:
                name: bioorchestrator-api-service
                port:
                  number: 8420
