---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odoo-api-ingress
  namespace: nekazari
  labels:
    app: odoo-backend
    module: odoo-erp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: {{API_DOMAIN}}
      http:
        paths:
          - path: /api/odoo
            pathType: Prefix
            backend:
              service:
                name: odoo-backend-service
                port:
                  number: 80
  tls:
    - hosts:
        - {{API_DOMAIN}}
      secretName: nkz-tls

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: odoo-headers
  namespace: nekazari
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Host: "{{ODOO_DOMAIN}}"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odoo-direct-ingress
  namespace: nekazari
  labels:
    app: odoo
    module: odoo-erp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: nekazari-odoo-headers@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: {{ODOO_DOMAIN}}
      http:
        paths:
          - path: /web/database/manager
            pathType: Prefix
            backend:
              service:
                name: odoo-backend-service
                port:
                  number: 80
          - path: /web/database/selector
            pathType: Prefix
            backend:
              service:
                name: odoo-backend-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: odoo-service
                port:
                  number: 8069
  tls:
    - hosts:
        - {{ODOO_DOMAIN}}
      secretName: odoo-tls
