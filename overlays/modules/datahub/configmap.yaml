# Production overlay: DataHub BFF ConfigMap (API URL from Git — no manual patch).
# Only this file holds the production API base URL; the module repo keeps an empty placeholder.
apiVersion: v1
kind: ConfigMap
metadata:
  name: datahub-api-config
  namespace: nekazari
data:
  PLATFORM_API_URL: "http://api-gateway-service:5000"
  CORS_ORIGINS: "https://{{FRONTEND_DOMAIN}},https://{{API_DOMAIN}}"
  TIMESERIES_ADAPTER_VEGETATION_HEALTH_URL: "http://vegetation-prime-api-service:8000"
  DATAHUB_ENTITY_TYPES: "AgriParcel,AgriSensor,WeatherObserved,WeatherStation,ManufacturingMachine,AutonomousMobileRobot,LivestockAnimal,Device,CropHealthAssessment,VegetationIndex"
