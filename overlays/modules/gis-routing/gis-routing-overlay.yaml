apiVersion: v1
kind: ConfigMap
metadata:
  name: gis-routing-config
  namespace: nekazari
  labels:
    app: nkz-module-gis-routing-backend
    module: nkz-module-gis-routing
data:
  CORS_ORIGINS: '["https://{{FRONTEND_DOMAIN}}"]'
  KEYCLOAK_URL: "https://{{KEYCLOAK_DOMAIN}}/auth"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nkz-module-gis-routing-ingress
  namespace: nekazari
  labels:
    app: nkz-module-gis-routing-backend
    module: nkz-module-gis-routing
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{FRONTEND_DOMAIN}}`) && PathPrefix(`/api/routing`)
      priority: 20
      services:
        - name: nkz-module-gis-routing-service
          port: 8000
      middlewares:
        - name: auth-middleware
  tls:
    certResolver: le
