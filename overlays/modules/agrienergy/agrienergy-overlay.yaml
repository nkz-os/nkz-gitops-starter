apiVersion: v1
kind: ConfigMap
metadata:
  name: agrienergy-config
  namespace: nekazari
  labels:
    app: agrienergy-backend
    module: agrienergy
data:
  CORS_ORIGINS: '["https://{{FRONTEND_DOMAIN}}"]'
  KEYCLOAK_URL: "https://{{KEYCLOAK_DOMAIN}}/auth"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agrienergy-api-frontend-host
  namespace: nekazari
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{FRONTEND_DOMAIN}}
      secretName: nekazari-tls
  rules:
    - host: {{FRONTEND_DOMAIN}}
      http:
        paths:
          - path: /api/agrienergy
            pathType: Prefix
            backend:
              service:
                name: agrienergy-api-service
                port:
                  number: 8000
