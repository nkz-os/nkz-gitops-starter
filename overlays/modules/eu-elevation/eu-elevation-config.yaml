apiVersion: v1
kind: ConfigMap
metadata:
  name: eu-elevation-config
  namespace: nekazari
  labels:
    app: eu-elevation-backend
    module: eu-elevation
data:
  ALLOWED_ORIGINS: "https://{{FRONTEND_DOMAIN}}"
  JWT_ISSUER: "https://{{KEYCLOAK_DOMAIN}}/auth/realms/nekazari"
  JWKS_URL: "https://{{KEYCLOAK_DOMAIN}}/auth/realms/nekazari/protocol/openid-connect/certs"
