apiVersion: v1
kind: ConfigMap
metadata:
  name: vegetation-prime-config
  namespace: nekazari
  labels:
    app: vegetation-prime-api
    module: vegetation-health
data:
  JWT_ISSUER: "https://{{KEYCLOAK_DOMAIN}}/auth/realms/nekazari"
  JWKS_URL: "https://{{KEYCLOAK_DOMAIN}}/auth/realms/nekazari/protocol/openid-connect/certs"
  TITILER_BASE_URL: "https://{{API_DOMAIN}}/titiler"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vegetation-module-ingress
  namespace: nekazari
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: {{FRONTEND_DOMAIN}}
    http:
      paths:
      - path: /vegetation-prime
        pathType: Prefix
        backend:
          service:
            name: vegetation-prime-api-service
            port:
              number: 8000
  tls:
  - hosts:
    - {{FRONTEND_DOMAIN}}
    secretName: nekazari-tls
