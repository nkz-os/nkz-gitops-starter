apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-configmaps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nkz-os/gitops-config
    targetRevision: HEAD
    path: overlays/core/configmaps
  destination:
    server: https://kubernetes.default.svc
    namespace: nekazari
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
